name = "black-payment-services"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages deployment.
# OpenNext Cloudflare builds a Worker (`.open-next/worker.js`) plus static
# assets (`.open-next/assets`). Cloudflare Pages deploys the contents of
# `pages_build_output_dir` and uses a `_worker.js` inside it as the
# Pages Functions worker that handles every request (API routes + SSR),
# serving static files through the auto-provided `ASSETS` binding.
# See scripts/prepare-pages.mjs which copies the built worker to
# `.open-next/assets/_worker.js` after `opennextjs-cloudflare build`.
pages_build_output_dir = ".open-next/assets"
