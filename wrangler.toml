# Cloudflare Workers/Pages Configuration
name = "black-payment-services"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Pages configuration
pages_build_output_dir = ".vercel/output/static"

# Public/non-secret environment variables are configured in Cloudflare Pages
# as build/runtime variables. Keeping them here can create duplicate bindings
# when Cloudflare also defines the same NEXT_PUBLIC_* variables.
#
# Required public variables:
# NEXT_PUBLIC_SUPABASE_URL
# NEXT_PUBLIC_SUPABASE_ANON_KEY
# NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY

# Secret-only variables to configure separately:
# SUPABASE_SERVICE_ROLE_KEY
# SUPABASE_SECRET_KEY
# SUPABASE_DB_URL
