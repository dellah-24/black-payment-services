# Cloudflare Workers configuration for BlackPayments Wallet
# Production deployment configuration

name = "blackpayments-wallet"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Production environment variables
[vars]
NODE_ENV = "production"
APP_NAME = "BlackPayments Wallet"
APP_VERSION = "1.0.0"

# Production routes
routes = [
  { pattern = "blackpayments.com/api/*", zone_name = "blackpayments.com" },
  { pattern = "api.blackpayments.com/*", zone_name = "blackpayments.com" },
]

# Production environment
[env.production]
vars = { NODE_ENV = "production" }

# Production secrets (set via wrangler secret)
# wrangler secret put SUPABASE_URL
# wrangler secret put SUPABASE_ANON_KEY
# wrangler secret put SUPABASE_SERVICE_ROLE_KEY
# wrangler secret put HSM_API_URL
# wrangler secret put HSM_API_KEY
# wrangler secret put ALCHEMY_API_KEY
# wrangler secret put WALLET_CONNECT_PROJECT_ID
# wrangler secret put JWT_SECRET
# wrangler secret put WALLET_ENCRYPTION_KEY
# wrangler secret put CSRF_SECRET
# wrangler secret put SENTRY_DSN
# wrangler secret put REDIS_URL
# wrangler secret put UPSTASH_REDIS_REST_URL
# wrangler secret put UPSTASH_REDIS_REST_TOKEN

# Production limits
[limits]
cpu_ms = 50000
memory_mb = 128

# Production observability
[observability]
enabled = true
head_sampling_rate = 1
