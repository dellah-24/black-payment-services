name = "black-payment-services"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages deployment (the live project is a Cloudflare Pages project
# with build command `pnpm run build:pages`).
#
# OpenNext Cloudflare builds a Worker (`.open-next/worker.js`) plus static
# assets (`.open-next/assets`). Cloudflare Pages deploys the contents of
# `pages_build_output_dir` and uses a `_worker.js` inside it as the Pages
# Functions worker that handles every request (API routes + SSR), serving
# static files through the auto-provided `ASSETS` binding.
#
# `scripts/prepare-pages.mjs` (run by `pnpm run build:pages`) copies the ENTIRE
# OpenNext worker runtime into `.open-next/assets` and names the entry
# `_worker.js`, so every relative import resolves next to it.
#
# NOTE on nodejs_compat: Cloudflare Pages applies the `nodejs_compat`
# compatibility flag from the **Pages project's** compatibility settings
# (Dashboard → Settings → Functions → Compatibility flags), NOT from
# wrangler.toml. That flag has been enabled on the project, which is what lets
# the app's Node.js built-ins (crypto, stream, async_hooks, fs, path, ...)
# resolve. Keep it enabled there.
#
# NOTE: The bundled OpenNext worker (worker.js + Next.js server handler) is
# larger than 3 MiB, so deploying requires the Cloudflare **Workers Paid** plan
# ($5/mo) which raises the Worker script size limit to 10 MiB. The Free plan
# (3 MiB) will fail at "Failed to publish your Function".
pages_build_output_dir = ".open-next/assets"
