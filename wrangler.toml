name = "black-payment-services"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages deployment.
# OpenNext Cloudflare builds a Worker (`.open-next/worker.js`) plus static
# assets (`.open-next/assets`). Cloudflare Pages deploys the contents of
# `pages_build_output_dir` and uses a `_worker.js` inside it as the
# Pages Functions worker that handles every request (API routes + SSR),
# serving static files through the auto-provided `ASSETS` binding.
# See scripts/prepare-pages.mjs which copies the ENTIRE OpenNext worker
# runtime (worker.js + its sibling modules: cloudflare/, .build/, middleware/,
# server-functions/) into `.open-next/assets/_worker.js` after
# `opennextjs-cloudflare build`, so every relative import resolves next to it.
#
# NOTE: The bundled OpenNext worker (worker.js + Next.js server handler) is
# larger than 3 MiB, so deploying requires the Cloudflare **Workers Paid** plan
# ($5/mo) which raises the Worker script size limit to 10 MiB. The Free plan
# (3 MiB) will fail at "Failed to publish your Function".
pages_build_output_dir = ".open-next/assets"
