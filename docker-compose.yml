version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME}
      - NEXT_PUBLIC_DEFAULT_CHAIN=${NEXT_PUBLIC_DEFAULT_CHAIN}
      - NEXT_PUBLIC_ETHEREUM_RPC=${NEXT_PUBLIC_ETHEREUM_RPC}
      - NEXT_PUBLIC_BSC_RPC=${NEXT_PUBLIC_BSC_RPC}
      - NEXT_PUBLIC_POLYGON_RPC=${NEXT_PUBLIC_POLYGON_RPC}
      - NEXT_PUBLIC_ARBITRUM_RPC=${NEXT_PUBLIC_ARBITRUM_RPC}
      - NEXT_PUBLIC_OPTIMISM_RPC=${NEXT_PUBLIC_OPTIMISM_RPC}
      - NEXT_PUBLIC_AVALANCHE_RPC=${NEXT_PUBLIC_AVALANCHE_RPC}
      - NEXT_PUBLIC_CELO_RPC=${NEXT_PUBLIC_CELO_RPC}
      - NEXT_PUBLIC_LINEA_RPC=${NEXT_PUBLIC_LINEA_RPC}
      - NEXT_PUBLIC_BASE_RPC=${NEXT_PUBLIC_BASE_RPC}
      - NEXT_PUBLIC_SOLANA_RPC=${NEXT_PUBLIC_SOLANA_RPC}
      - NEXT_PUBLIC_TRON_RPC=${NEXT_PUBLIC_TRON_RPC}
      - ETHEREUM_RPC_URL=${ETHEREUM_RPC_URL}
      - BSC_RPC_URL=${BSC_RPC_URL}
      - POLYGON_RPC_URL=${POLYGON_RPC_URL}
      - ARBITRUM_RPC_URL=${ARBITRUM_RPC_URL}
      - OPTIMISM_RPC_URL=${OPTIMISM_RPC_URL}
      - AVALANCHE_RPC_URL=${AVALANCHE_RPC_URL}
      - CELO_RPC_URL=${CELO_RPC_URL}
      - LINEA_RPC_URL=${LINEA_RPC_URL}
      - BASE_RPC_URL=${BASE_RPC_URL}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL}
      - TRON_RPC_URL=${TRON_RPC_URL}
      - TRON_FULL_NODE=${TRON_FULL_NODE}
      - TRON_SOLIDITY_NODE=${TRON_SOLIDITY_NODE}
      - TRON_EVENT_SERVER=${TRON_EVENT_SERVER}
      - CUSTODIAL_KEY_MANAGER_MODE=${CUSTODIAL_KEY_MANAGER_MODE}
      - CUSTODIAL_HSM_BASE_URL=${CUSTODIAL_HSM_BASE_URL}
      - CUSTODIAL_HSM_TOKEN=${CUSTODIAL_HSM_TOKEN}
      - REDIS_REST_URL=${REDIS_REST_URL}
      - REDIS_REST_TOKEN=${REDIS_REST_TOKEN}
      - NEXT_PUBLIC_ALCHEMY_API_KEY=${NEXT_PUBLIC_ALCHEMY_API_KEY}
      - ALCHEMY_API_KEY=${ALCHEMY_API_KEY}
      - NEXT_PUBLIC_1INCH_API_KEY=${NEXT_PUBLIC_1INCH_API_KEY}
      - NEXT_PUBLIC_MOONPAY_PUBLIC_KEY=${NEXT_PUBLIC_MOONPAY_PUBLIC_KEY}
      - MOONPAY_SECRET_KEY=${MOONPAY_SECRET_KEY}
      - NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}
      - NEXT_PUBLIC_ETHERSCAN_URL=${NEXT_PUBLIC_ETHERSCAN_URL}
      - NEXT_PUBLIC_BSCSCAN_URL=${NEXT_PUBLIC_BSCSCAN_URL}
      - NEXT_PUBLIC_POLYGONSCAN_URL=${NEXT_PUBLIC_POLYGONSCAN_URL}
      - NEXT_PUBLIC_GA_TRACKING_ID=${NEXT_PUBLIC_GA_TRACKING_ID}
      - NEXT_PUBLIC_VAPID_PUBLIC_KEY=${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      - SENTRY_DSN=${SENTRY_DSN}
    env_file:
      - .env.local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
